<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Settings</title>
  <link rel="stylesheet" href="/qassets/css/client-dashboard.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <section class="header-group-container">
      <div class="group left-group">Suite Seat</div>
      <div class="group right-group"> 
        <button id="open-login-popup-btn">Login</button>
        </div>
    </section>
  </header>


<!-- In views/booking-page.ejs (or your page HTML) -->


                      <!-- Subheader-->
<section class="subheader">
    <div class="subheader-left">
      <h3></h3>
    </div>
  </section>

  
  <section class="options-bar">
    
<!-- Your settings button style="display: inline-block;"-->
<button id="open-settings-popup-btn" type="button" style="display: none;">⚙️</button>
 

  </section>

  <section class="profile-photo" style="display: none">
 <div class="profile-photo-wrapper">
  <img id="client-profile-photo" src="https://live-353x.onrender.com/uploads/default-avatar.png" />

  <button class="edit-photo-btn" onclick="openSettingsPopup()">
    ✏️
  </button>
</div>

  </section>

<!-- Tab Navigation -->
<div class="tab-nav">
  <button class="tab-button active" data-tab="appointments-tab">Appointments</button>
  <button class="tab-button" data-tab="courses-tab">Courses</button>
  <button class="tab-button" data-tab="orders-tab">Orders</button>
</div>

  <!-- Tab Content -->
 <!-- Appointments Tab with Sub-Tabs -->
  <div id="my-appointments"></div>

<div class="tab-content" id="appointments-tab" style="display: block;">
  <h2>Your Appointments</h2>

  <!-- Sub-Tabs -->
  <div class="sub-tab-buttons">
    <button class="sub-tab-btn " data-tab="all">All</button>
    <button class="sub-tab-btn active" data-tab="upcoming">Upcoming</button> <!-- Make this active -->
    <button class="sub-tab-btn" data-tab="past">Past</button>
  </div>

  <!-- Sub-Tab Content -->

<div class="sub-tab-content" id="all-appointments" style="display: none;"></div>
<div class="sub-tab-content" id="upcoming-appointments" style="display: block;"></div> <!-- Show this -->
<div class="sub-tab-content" id="past-appointments" style="display: none;"></div>

</div>






<!-- Orders-Tab Content -->
<div class="tab-content" id="orders-tab" style="display: none;">
  <h2>Your Orders</h2>
  <div id="orders-list"></div>
</div>



<!-- Courses -Tab Content -->
<div class="tab-content" id="courses-tab" style="display: none;">
  <h2>Your Courses</h2>
  <div id="courses-list"></div>
</div>




  <!-- Overlay background for popups -->
<div id="popup-overlay"
     style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:999;"></div>


                         <!-- Popups  -->
  <!-- Reschedule Popup -->
<div id="popup-reschedule" class="popup" style="display: none;">
  <div class="popup-content">
    <h3>Reschedule Appointment</h3>

    <form id="reschedule-form">
      <input type="hidden" id="reschedule-appointment-id" />
      <input type="hidden" id="reschedule-calendar-id" name="calendarId" />
      <input type="hidden" id="reschedule-date" name="date" />
      <input type="hidden" id="reschedule-time" name="time" />

      <div class="form-group">
        <label for="reschedule-category">Category</label>
        <select id="reschedule-category">
          <option value="">-- Select Category --</option>
        </select>
      </div>

      <div class="form-group">
        <label for="reschedule-service">Service</label>
        <select id="reschedule-service">
          <option value="">-- Select Service --</option>
        </select>
      </div>


      <div class="popup-actions" style="margin-top: 20px;">
        <button type="submit" class="btn-confirm" id="reschedule-submit-btn">Confirm Reschedule</button>
        <button type="button" class="btn-cancel" onclick="closeReschedulePopup()">Cancel</button>
      </div>
    </form>
  </div>
</div>


<!-- Order Details Modal -->
<div id="order-details-overlay" class="order-details-overlay" style="display:none;">
  <div class="order-details-modal">
    <button id="order-details-close" class="order-details-close">&times;</button>

    <div class="order-details-header">
      <h2 id="od-title">Order</h2>
      <p id="od-link-page" class="od-link-page"></p>
    </div>

    <div class="order-details-body">
      <div id="od-thumb" class="od-thumb" style="display:none;">
        <img id="od-thumb-img" alt="" />
      </div>

      <p id="od-date" class="od-meta"></p>
      <p id="od-price" class="od-meta"></p>
      <p id="od-desc"></p>

      <!-- 🔹 JS will put "Downloads" + links in here -->
      <div id="od-downloads" class="order-downloads-section"></div>
    </div>

    <div class="order-details-footer">
      <a id="od-open-link" href="#" target="_blank" class="od-open-link">
        Open link page
      </a>
    </div>
  </div>
</div>







<!-- Settings Popup -->
<section id="popup-settings" class="popup-add-business" style="display: none;">
  <div class="business-section-header">
    <div class="spacer"></div>
    <h2 id="popup-title" class="section-title">Settings</h2>

    <button
      type="button"
      id="close-settings-popup-btn"
      style="float:right; border:none; background:none; font-size:18px;"
    >
      &times;
    </button>
  </div>

  <button type="button" id="open-change-password-popup-btn">Change Password</button>

  <form id="settings-form">
    <div class="form-group">
      <label for="popup-first-name-input">First Name*</label><br>
      <input id="popup-first-name-input" name="firstName" type="text" placeholder="Enter first name" required>
    </div>

    <div class="form-group">
      <label for="popup-last-name-input">Last Name*</label><br>
      <input id="popup-last-name-input" name="lastName" type="text" placeholder="Enter last name" required>
    </div>

    <div class="form-group">
      <label for="popup-phone-number-input">Phone Number</label><br>
      <input id="popup-phone-number-input" name="phone" type="text" placeholder="Enter phone number">
    </div>

    <div class="form-group">
      <label for="popup-address-input">Address</label>
      <input id="popup-address-input" name="address" type="text" placeholder="Enter address">
    </div>

    <div class="form-group">
      <label for="popup-email-input">Email</label><br>
      <input id="popup-email-input" name="email" type="email" placeholder="Enter email">
    </div>

    <div class="form-group">
      <label for="image-upload">Profile Photo</label><br>
      <input type="file" id="image-upload" name="profilePhoto" accept="image/*">

      <div id="current-profile-photo-container" style="margin-top: 10px;">
        <img id="client-profile-photo-preview" alt="Profile" style="display:none;">
        <p id="no-image-text" style="display: none;">No image uploaded yet.</p>
      </div>
    </div>

    <div class="button-center-wrapper">
      <button type="submit" id="save-button" class="save-settings">Save</button>
    </div>
  </form>
</section>

  
<!-- Change Password Popup -->
<section id="popup-change-password" class="popup-add-business" style="display: none;">
  <button type="button" id="close-change-password-popup-btn" style="float:right;">&times;</button>

  <h2>Change Password</h2>

  <form id="change-password-form">
    <input type="password" id="current-password" placeholder="Current Password" required />
    <input type="password" id="new-password" placeholder="New Password" required />
    <input type="password" id="confirm-password" placeholder="Confirm New Password" required />
    <button type="submit">Change Password</button>
  </form>
</section>

<!-- Login Popup -->
<section id="popup-login" class="popup-add-business" style="display: none;">
  <div class="business-section-header">
    <div class="spacer"></div>
    <h2 class="section-title">Login</h2>
    <button type="button" id="close-login-popup-btn" style="float:right; border:none; background:none; font-size:18px;">&times;</button>
  </div>

  <form id="login-form">
    <div class="form-group">
      <label for="login-email">Email</label><br>
      <input type="email" id="login-email" required placeholder="Enter your email" />
    </div>

    <div class="form-group">
      <label for="login-password">Password</label><br>
      <input type="password" id="login-password" required placeholder="Enter your password" />
    </div>

    <p style="margin-top:10px;">
      <button
        type="button"
        id="open-forgot-password-popup-btn"
        style="border:none; background:none; color:blue; cursor:pointer; text-decoration:underline;"
      >
        Forgot password?
      </button>
    </p>

    <div class="button-center-wrapper">
      <button type="submit" class="add-business-button">Log In</button>
    </div>
  </form>
</section>
 
<!-- Forgot Password Popup -->
<section id="popup-forgot-password" class="popup-add-business" style="display: none;">
  <div class="business-section-header">
    <div class="spacer"></div>
    <h2 class="section-title">Forgot Password</h2>
    <button type="button" id="close-forgot-password-popup-btn" style="float:right; border:none; background:none; font-size:18px;">&times;</button>
  </div>

  <form id="forgot-password-form">
    <div class="form-group">
      <label for="forgot-password-email">Email</label><br>
      <input type="email" id="forgot-password-email" required placeholder="Enter your email" />
    </div>

    <div class="button-center-wrapper">
      <button type="submit" class="add-business-button">Send Reset Link</button>
    </div>
  </form>
</section>

<script src="/qassets/js/client-dashboard.js" defer></script>
</body>
</html>
